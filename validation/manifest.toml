[set]
name = "dev_couple_sph_cfd-validation"
tier = "dev_couple_sph_cfd"
description = "Skeptic-facing validation gate for the SPH<->CFD plume/surface coupling. The gate runs the live plume_surface seam, compares measured U_mf against DEM-CFD and Wen-Yu references, executes negative controls, and regenerates the committed validation figure from the same output."

[[validation]]
id = "plume_surface"
mode = "smoke"
kind = "example-sweep"
command = "python3 examples/plume_surface/sweep.py"
reference = "Dynamic SPH-CFD minimum fluidization through the live seam: SPH measured U_mf is checked against the same-seam DEM-CFD reference and the independent Wen & Yu (1966) correlation; omit-gradP and eps-power-bug negative controls must move outside tolerance. The sweep regenerates examples/plume_surface/plots/plume_surface_validation.svg."
