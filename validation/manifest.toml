[set]
name = "dev_couple_sph_cfd-regression"
tier = "dev_couple_sph_cfd"
description = "Local packed-bed force-transfer regression. It is not a plume/crater validation gate; external held-out evidence is required before that claim can be evaluated."

[[validation]]
id = "plume_surface"
mode = "smoke"
kind = "example-sweep"
command = "python3 examples/plume_surface/sweep.py"
reference = "A homogeneous, imposed-flow packed-bed regression: same-seam DEM is consistency only; Wen & Yu is a diagnostic packed-bed comparator. Fault controls test code sensitivity. The sweep regenerates examples/plume_surface/plots/plume_surface_validation.svg."
