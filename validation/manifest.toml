[set]
name = "dev_couple_sph_cfd-smoke"
tier = "dev_couple_sph_cfd"
description = "Executable packed-bed force-transfer smoke case. It is not a plume/crater validation gate; external held-out evidence is required before that claim can be evaluated."

[[validation]]
id = "packed_bed_seam_smoke"
mode = "smoke"
kind = "example-smoke"
command = "cargo run --release --example packed_bed_seam -- examples/packed_bed_seam/config.toml"
reference = "A homogeneous, imposed-flow executable smoke case. Same-seam DEM and Wen & Yu are diagnostics only; sensitivity probes exercise altered coupling paths. No local result is an acceptance criterion or scientific evidence."
