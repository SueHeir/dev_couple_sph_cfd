name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  coupling:
    name: standalone public coupling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Reject private and sibling-only dependencies
        run: |
          ! grep -R -E '192\.168\.|ssh://git@|path = "\.\./' --include='Cargo.toml' .
      - name: Test workspace
        run: cargo test --workspace
      - name: Same-binary local and 3+2 MPI example
        env:
          OMPI_MCA_rmaps_base_oversubscribe: "1"
        run: |
          cargo run --example routed_sph_cfd --features mpi-routing
          cargo build --example routed_sph_cfd --features mpi-routing
          timeout 60 mpirun --oversubscribe -np 5 target/debug/examples/routed_sph_cfd
