# ──────────────────────────────────────────────────────────────────────────────
# Imposed-flow packed-bed force-transfer smoke case. This is not a plume,
# impinging-jet, crater, erosion, or ejecta case.
#
# A gas flows UP (+z) through a settled μ(I)-continuum granular bed (dev_soil_sph SPH),
# coupled to the gas (dev_field_efvm FIELD) through the DEM–CFD seam VERBATIM
# (`cfd_ibm::coupling`). The local smoke case reports U_mf through the live seam,
# plus a same-seam DEM consistency value and a Wen & Yu (1966) packed-bed
# comparator. Sensitivity probes and the dynamic sweep are reported as diagnostics.
# They do not create experimental evidence or plume acceptance criteria.
#
# Small & fast: coarse gas mesh, d = 0.5 mm grains, a ~3 cm bed, air.
# Everything below is declarative; the .rs holds no physics magic numbers.
# ──────────────────────────────────────────────────────────────────────────────

[gas]
rho = 1.2          # kg/m^3  (air)
p   = 1.0e5        # Pa
mu  = 1.8e-5       # Pa.s    (air dynamic viscosity)

[flow]
# This executable accepts only this explicitly imposed, spatially uniform flow.
# It is deliberately not a nozzle boundary condition or an advancing CFD solve.
model = "imposed_uniform_interstitial_velocity"

[bed]
# μ(I) granular material (glass-like) — the dev_soil_sph SPH continuum.
rho_s        = 2500.0    # grain (solid) density kg/m^3
rho_c        = 1500.0    # contact-branch onset density
mu_s         = 0.38      # μ(I): static friction
mu_2         = 0.64      # μ(I): dynamic-limit friction
i0           = 0.28      # μ(I): inertial number scale
bulk_modulus = 3.75e6    # Pa
poisson      = 0.3
grain_d      = 0.5e-3    # m  — GRAIN diameter fed to the packed-bed closure
restitution  = 0.7
rest_density = 1500.0    # bulk density -> Phi = 0.60, eps_bed = 0.40 (canonical)
spacing      = 0.005     # m  — SPH parcel lattice spacing
# Bed region (periodic x/y, frozen floor below z=0):
x_lo = 0.0
x_hi = 0.02
y_lo = 0.0
y_hi = 0.02
z_lo = 0.0
z_hi = 0.03              # ~3 cm tall bed
floor_thickness = 0.01   # frozen floor from -floor_thickness to 0
settle_steps = 1200      # gravity relaxation before measuring eps_bed
sph_dt = 1.0e-5          # s  (SPH timestep; c=sqrt(K/rho)~50 m/s -> dx/c~1e-4)

[grid]
# Gas (FIELD) mesh: x/y span the bed footprint, z spans bed + freeboard.
nx = 8
ny = 8
nz = 40
ng = 2
z_hi = 0.08              # freeboard top (m)

[gravity]
gz = -9.81

[dem]
# Discrete DEM reference bed: an FCC sphere packing of the SAME grain size and
# (target) bulk solid fraction, run through the IDENTICAL seam (cross-method).
solid_fraction = 0.60    # -> eps_dem = 0.40
ncx = 4
ncy = 4
ncz = 8

[run]
# Live coupled dynamical fluidization sweep (× U_mf) — must bracket onset (1.0).
dyn_factors = [0.5, 0.8, 1.2, 1.5]
dyn_steps   = 2500        # coupled parent iterations per sweep point
