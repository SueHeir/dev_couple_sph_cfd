# ──────────────────────────────────────────────────────────────────────────────
# Coupled SPH–CFD plume/surface interaction — the DYNAMIC minimum-fluidization
# limit, cross-validated against the resolved DEM–CFD reference.
#
# A gas flows UP (+z) through a settled μ(I)-continuum granular bed (dev_soil_sph SPH),
# coupled to the gas (dev_field_efvm FIELD) through the DEM–CFD seam VERBATIM
# (`cfd_ibm::coupling`). The tolerance-checked observable is the minimum
# fluidization velocity U_mf, measured through the LIVE coupled seam and:
#   1. cross-method vs the discrete DEM–CFD bed run through the identical seam
#      (the resolved DEM–CFD reference — cf. fluidized_bed_umf / PR #6),
#   2. vs the independent Wen & Yu (1966) correlation,
# with two negative controls (omit-∇P, ε-power bug) that RUN and must fail, plus a
# live coupled dynamical sweep in which the SPH continuum fluidizes above U_mf
# (net upward COM velocity, grain-contact pressure collapsing) and stays packed
# below. The MEASURED force uses the INDEPENDENT MacDonald (1979) 180/1.8 closure
# (no shared constant with Wen & Yu), so agreement is genuine, not tautological.
#
# Small & fast: coarse gas mesh, d = 0.5 mm grains, a ~3 cm bed, air.
# Everything below is declarative; the .rs holds no physics magic numbers.
# ──────────────────────────────────────────────────────────────────────────────

[gas]
rho = 1.2          # kg/m^3  (air)
p   = 1.0e5        # Pa
mu  = 1.8e-5       # Pa.s    (air dynamic viscosity)

[bed]
# μ(I) granular material (glass-like) — the dev_soil_sph SPH continuum.
rho_s        = 2500.0    # grain (solid) density kg/m^3
rho_c        = 1500.0    # contact-branch onset density
mu_s         = 0.38      # μ(I): static friction
mu_2         = 0.64      # μ(I): dynamic-limit friction
i0           = 0.28      # μ(I): inertial number scale
bulk_modulus = 3.75e6    # Pa
poisson      = 0.3
grain_d      = 0.5e-3    # m  — GRAIN diameter fed to the packed-bed closure
restitution  = 0.7
rest_density = 1500.0    # bulk density -> Phi = 0.60, eps_bed = 0.40 (canonical)
spacing      = 0.005     # m  — SPH parcel lattice spacing
# Bed region (periodic x/y, frozen floor below z=0):
x_lo = 0.0
x_hi = 0.02
y_lo = 0.0
y_hi = 0.02
z_lo = 0.0
z_hi = 0.03              # ~3 cm tall bed
floor_thickness = 0.01   # frozen floor from -floor_thickness to 0
settle_steps = 1200      # gravity relaxation before measuring eps_bed
sph_dt = 1.0e-5          # s  (SPH timestep; c=sqrt(K/rho)~50 m/s -> dx/c~1e-4)

[grid]
# Gas (FIELD) mesh: x/y span the bed footprint, z spans bed + freeboard.
nx = 8
ny = 8
nz = 40
ng = 2
z_hi = 0.08              # freeboard top (m)

[gravity]
gz = -9.81

[dem]
# Discrete DEM reference bed: an FCC sphere packing of the SAME grain size and
# (target) bulk solid fraction, run through the IDENTICAL seam (cross-method).
solid_fraction = 0.60    # -> eps_dem = 0.40
ncx = 4
ncy = 4
ncz = 8

[run]
# Live coupled dynamical fluidization sweep (× U_mf) — must bracket onset (1.0).
dyn_factors = [0.5, 0.8, 1.2, 1.5]
dyn_steps   = 2500        # coupled parent iterations per sweep point

[validation]
# Gate: cross-method + independent + non-tautology + negative controls + dynamical.
tol_dem          = 0.10   # |U_mf_SPH - U_mf_DEM| / U_mf_DEM (continuum vs discrete)
tol_wenyu        = 0.20   # |U_mf_SPH - U_mf_WenYu| / U_mf_WenYu (fluidization scatter)
umf_err_floor    = 0.005  # non-tautology floor: measured vs-WenYu err must exceed this
eps_bed_lo       = 0.33   # settled continuum voidage in a physical range
eps_bed_hi       = 0.47
eps_max          = 0.50   # dense (Ergun/MacDonald) regime gate
tol_deposit_cell = 0.10   # worst |eps_cell - eps_bed|/eps_bed (deposit fidelity)
tol_momentum     = 1.0e-9 # two-way momentum-exchange conservation (sanity)
fluidized_p_frac = 0.05   # above U_mf: contact p COLLAPSES below 5% of settled (offloaded)
packed_p_frac    = 0.10   # below U_mf: contact p stays above 10% of settled (residual load)
v_fluid_min      = 1.0e-3 # m/s: upward COM velocity separating lifting from static
